{%extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 rounded-3 mt-5">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Iniciar Sesión</h3>
                
                <form action="{{url_for('login')}}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Correo electronico</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="contraseña" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Iniciar sesion</button>
                </form>

                <div class="text-center mt-3">
                    <small>No tienes cuenta? <a href="{{url_for('registro')}}">Registrate</a></small>
                </div>
                <div class="text-center mt-3">
                    <small>Olvidaste tu contraseña? <a href="{{url_for('recuperar_password')}}">Recuperar contraseña</a></small>
                </div>
            </div>
        </div>
</div>

{% endblock %}
